# If your site is in 'https', then make sure your base url isn't written using 'http' otherwise your sitemap would
# contain http (as opposeed to https) URLs. This would affect Google indexing of your URLs.
baseURL: "https://luochang212.github.io/profile/"
title: StellarTide
pagination:
  pagerSize: 5
theme: [hugo-PaperMod]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
disableKinds: [taxonomy, term]
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "papermod"]

minify:
  disableXML: true
  minifyOutput: true

languages:
  en:
    languageName: "en"
    weight: 1
    taxonomies:
      category: FRcategories
      tag: FRtags
      series: FRseries
    menu:
      main:
        - name: Now
          url: now
          weight: 1
        - name: Picks
          url: picks
          weight: 2
        - name: About
          url: about
          weight: 3

    params:
      defaultTheme: auto
      profileMode:
        enabled: true
        title: StellarTide
        subtitle: "🌊 Where StellarTide meet infinite possibilities ✨"
        imageUrl: "avatar.webp"
        imageTitle: ProfileMode image
        imageWidth: 125
        imageHeight: 125
        buttons:
          - name: About Me
            url: about
          - name: Blog
            url: https://luochang212.github.io

      socialIcons:
        - name: "x"
          url: "https://x.com/_stellar_tide"
        - name: "GitHub"
          url: "https://github.com/luochang212"
        - name: "zhihu"
          url: "https://www.zhihu.com/people/Fashionable"
        - name: "wechat"
          url: "https://luochang212.github.io/images/wechat.jpg"
        - name: "bilibili"
          url: "https://space.bilibili.com/1039888710"

  cn:
    languageName: "cn"
    weight: 2
    taxonomies:
      category: FAcategories
      tag: FAtags
      series: FAseries
    menu:
      main:
        - name: 本手
          url: now
          weight: 1
        - name: 妙手
          url: picks
          weight: 2
        - name: 俗手
          url: about
          weight: 3

    params:
      languageAltTitle: Chinese
      defaultTheme: auto
      profileMode:
        enabled: true
        title: 星汐引力
        subtitle: "😴 推枕惘然不见，但空江，月明千里 🌙"
        imageUrl: "avatar.webp"
        imageTitle: ProfileMode image
        imageWidth: 125
        imageHeight: 125
        buttons:
          - name: 关于我
            url: about
          - name: 博客
            url: https://luochang212.github.io

      socialIcons:
        - name: "x"
          url: "https://x.com/_stellar_tide"
        - name: "GitHub"
          url: "https://github.com/luochang212"
        - name: "zhihu"
          url: "https://www.zhihu.com/people/Fashionable"
        - name: "wechat"
          url: "https://luochang212.github.io/images/wechat.jpg"
        - name: "bilibili"
          url: "https://space.bilibili.com/1039888710"

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "星汐引力的个人主页"
  author: StellarTide
  # author: ["Me", "You"] # multiple authors

  defaultTheme: auto
  disableThemeToggle: false
  # ShowShareButtons: true
  # ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  # ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  # ShowToc: true
  comments: false
  images: ["avatar.webp"]

  assets:
    favicon: "favicon.ico"
    favicon16x16: "favicon.ico"
    favicon32x32: "favicon.ico"
    apple_touch_icon: "favicon.ico"
    safari_pinned_tab: "favicon.ico"

  # cover:
  #     hidden: true # hide everywhere but not in structured data
  #     hiddenInList: true # hide on list pages and home
  #     hiddenInSingle: true # hide on single page

  # fuseOpts:
  #     isCaseSensitive: false
  #     shouldSort: true
  #     location: 0
  #     distance: 1000
  #     threshold: 0.4
  #     minMatchCharLength: 0
  #     keys: ["title", "permalink", "summary", "content"]

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai

privacy:
  vimeo:
    disabled: false
    simple: true

  x:
    disabled: false
    enableDNT: true
    simple: true

  instagram:
    disabled: false
    simple: true

  youtube:
    disabled: false
    privacyEnhanced: true

services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true
